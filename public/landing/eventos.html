<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Eventos - CFC</title>
	<base href="/landing/">
	<link rel="icon" href="logo.png">
	<link rel="stylesheet" href="./style.css">
	<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

   <div id="menu-contenedor"></div>

	<section class="page-header fade-in">
		<h1>Próximos Eventos</h1>
		<p>Agendá nuestras actividades destacadas y sumate a la familia.</p>
	</section>

	<section class="eventos-container fade-in delay">
        
		<div class="mes-bloque">
			<h2 class="mes-titulo">Abril</h2>
            
			<div class="evento-card">
				<div class="evento-fecha">
					<span class="dia-num">19</span>
					<span class="dia-nombre">Dom</span>
				</div>
				<div class="evento-info">
					<h3>Día de Amigos</h3>
					<span class="evento-hora">
						<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
						10:00 hs
					</span>
				</div>
			</div>

			<div class="evento-card">
				<div class="evento-fecha">
					<span class="dia-num">30</span>
					<span class="dia-nombre">Jue</span>
				</div>
				<div class="evento-info">
					<h3>Reunión de Mujeres</h3>
					<span class="evento-hora">
						<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
						19:30 hs
					</span>
				</div>
			</div>
            
			<div class="evento-card">
				<div class="evento-fecha">
					<span class="dia-num">02</span>
					<span class="dia-nombre">Sáb</span>
				</div>
				<div class="evento-info">
					<h3>Encuentro de Jóvenes</h3>
					<span class="evento-hora">
						<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
						20:00 hs
					</span>
				</div>
			</div>
            
		</div>
        
	</section>

	<div id="footer-contenedor"></div>

	<script src="./componentes.js"></script>
</body>
</html>
